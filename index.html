<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hospital — Prototype</title>
  <link rel="stylesheet" href="styles.css?v=4">
  <link rel="stylesheet" href="interaction.css?v=14">
</head>
<body>
  <header class="topbar">
    <div><span class="eyebrow">HOSPITAL PROTOTYPE</span><h1>Operations Board</h1></div>
    <div class="stats" id="stats"></div>
  </header>
  <main>
    <section class="briefing" id="briefing"></section>
    <section class="map-panel panel">
      <div class="section-heading">
        <div><span class="eyebrow">HOSPITAL MAP</span><h2>Your clinical engine</h2></div>
        <div class="map-help">Select a staff card, then choose a compatible room.</div>
      </div>
      <div class="arrival-area">
        <div><span class="eyebrow">ARRIVALS</span><strong>Patient queue</strong></div>
        <div class="arrival-queue" id="arrivalQueue"></div>
      </div>
      <div class="hospital-map" id="hospitalMap"></div>
    </section>
    <section class="lower-grid">
      <section class="panel staff-panel">
        <div class="section-heading">
          <div><span class="eyebrow">WORKFORCE</span><h2>Staff cards</h2></div>
          <button class="text-button" id="clearSelection">Clear selection</button>
        </div>
        <div class="card-grid" id="staff"></div>
      </section>
      <section class="panel">
        <div class="section-heading">
          <div><span class="eyebrow">EXPANSION</span><h2>Market</h2></div>
          <button class="primary" id="endTurn">End round</button>
        </div>
        <div class="card-grid market-grid" id="market"></div>
      </section>
    </section>
    <section class="panel log">
      <div class="section-heading">
        <div><span class="eyebrow">HANDOVER</span><h2>Round log</h2></div>
        <button class="text-button" id="reset">Restart prototype</button>
      </div>
      <ol id="log"></ol>
    </section>
  </main>
  <div class="toast" id="toast" role="status"></div>
  <script type="module" src="src/app.js?v=24"></script>
</body>
</html>
