<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital — Prototype</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div><span class="eyebrow">HOSPITAL PROTOTYPE</span><h1>Morning Board</h1></div>
    <div class="stats" id="stats"></div>
  </header>
  <main>
    <section class="briefing panel" id="briefing"></section>
    <section class="board">
      <div class="column panel">
        <div class="section-heading"><div><span class="eyebrow">INTAKE</span><h2>Emergency Department</h2></div><span class="capacity" id="edCapacity"></span></div>
        <div class="card-grid patients" id="ed"></div>
      </div>
      <div class="column panel">
        <div class="section-heading"><div><span class="eyebrow">INPATIENT</span><h2>Ward</h2></div><span class="capacity" id="wardCapacity"></span></div>
        <div class="card-grid patients" id="ward"></div>
      </div>
    </section>
    <section class="engine panel">
      <div class="section-heading"><div><span class="eyebrow">YOUR ENGINE</span><h2>Staff & facilities</h2></div><div class="resources" id="resources"></div></div>
      <div class="engine-grid"><div><h3>Staff cards</h3><div class="card-grid" id="staff"></div></div><div><h3>Facility cards</h3><div class="card-grid" id="facilities"></div></div></div>
    </section>
    <section class="market panel">
      <div class="section-heading"><div><span class="eyebrow">EXPANSION</span><h2>Hospital market</h2></div><button class="primary" id="endTurn">End round</button></div>
      <div class="card-grid" id="market"></div>
    </section>
    <section class="log panel"><div class="section-heading"><div><span class="eyebrow">HANDOVER</span><h2>Round log</h2></div><button class="text-button" id="reset">Restart prototype</button></div><ol id="log"></ol></section>
  </main>
  <div class="toast" id="toast" role="status"></div>
  <script type="module" src="src/app.js"></script>
</body>
</html>
